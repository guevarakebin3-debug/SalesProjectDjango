{% extends 'billing/base.html' %}
{% block title %}Eliminar Marca{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow border-danger">
      <div class="card-header bg-danger text-white"><h4>Confirmar eliminación</h4></div>
      <div class="card-body">
        <p>Estás seguro de eliminar la Marca <strong>{{ object }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Si, Eliminar</button>
          <a href="{% url 'billing:brand_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
